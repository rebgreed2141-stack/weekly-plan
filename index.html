<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>週案日誌</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4CAF50">
  <link rel="icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="title">週案日誌</div>
        <div class="sub">自動保存（入力ごと） / 800×1280（縦）想定</div>
      </div>
    </div>

    <div class="tabBar">
      <div class="tabBarLeft">
        <button type="button" class="tabBtn active" id="tabMainBtn" data-tab="main">入力</button>
        <button type="button" class="tabBtn" id="tabCalendarBtn" data-tab="calendar">カレンダー</button>
        <button type="button" class="tabBtn" id="tabManageBtn" data-tab="manage">管理</button>
      </div>
      <div class="tabVersion">Ver1.0.0</div>
    </div>

    <section class="tabPanel active" id="tabMain">
      <div class="card">
        <div class="autoLine">
          <label>クラス</label>
          <div class="inputs">
            <select id="classSelect">
              <option value="">クラス（選択）</option>
              <option value="もみじ">もみじ</option>
              <option value="どんぐり">どんぐり</option>
              <option value="こぐま">こぐま</option>
              <option value="りす">りす</option>
              <option value="のうさぎ">のうさぎ</option>
              <option value="かもしか">かもしか</option>
            </select>
          </div>
        </div>

        <div class="autoLine">
          <label>週</label>
          <div class="autoValue" id="weekLabel">—</div>
        </div>

        <div class="autoLine" style="margin-bottom:0;">
          <label>クラス</label>
          <div class="autoValue" id="classLabel">—</div>
        </div>
      </div>

      <div class="card">
        <div class="sectionTitle">週のねらい</div>
        <textarea id="weeklyAim" placeholder="週のねらいを入力"></textarea>

        <div class="sectionTitle" style="margin-top:10px;">行事（空欄OK）</div>
        <input id="events" type="text" placeholder="行事がなければ空欄" />
      </div>

      <div class="card">
        <div class="sectionTitle">日誌（開始日から6日分）</div>
        <table>
          <thead>
            <tr>
              <th class="colDate">日付</th>
              <th>子どもの活動</th>
              <th>保育評価（日誌）</th>
              <th>出欠状況</th>
            </tr>
          </thead>
          <tbody id="journalBody"></tbody>
        </table>
      </div>

      <div class="card">
        <div class="sectionTitle">1週間の評価</div>
        <textarea id="weeklyEvaluation" class="shortArea" placeholder="1週間の評価"></textarea>
      </div>

      <div class="card">
        <div class="sectionTitle">個別（事例と今後の展望）</div>

        <div class="caseBox">
          <div class="caseHead">
            <label>事例1 日付</label>
            <input id="case1Date" type="date" />
          </div>
          <textarea id="case1Text" class="shortArea" placeholder="事例1（今後の展望など）"></textarea>
        </div>

        <div class="caseBox">
          <div class="caseHead">
            <label>事例2 日付</label>
            <input id="case2Date" type="date" />
          </div>
          <textarea id="case2Text" class="shortArea" placeholder="事例2（今後の展望など）"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="statusbar">
          <div>保存：自動</div>
          <div>週キー：<span class="mono" id="weekKeyView">未設定</span></div>
          <div>最終保存：<span class="mono" id="lastSavedView">—</span></div>
        </div>
      </div>
    </section>

    <section class="tabPanel" id="tabCalendar">
      <div class="card">
        <div class="calendarHead">
          <button type="button" id="btnPrevMonth">前の月</button>
          <div class="calendarTitle" id="calendarTitle">—</div>
          <button type="button" id="btnNextMonth">次の月</button>
        </div>
        <div class="calendarHelp">月曜日を選択できます。4月1日が火〜土の年度だけ、その4月1日も選択できます。入力日は各クラスの頭文字（も・ど・こ・り・の・か）で表示します。</div>

        <div class="calendarWeekHeader">
          <div>日</div>
          <div>月</div>
          <div>火</div>
          <div>水</div>
          <div>木</div>
          <div>金</div>
          <div>土</div>
        </div>

        <div class="calendarGrid" id="calendarGrid"></div>
      </div>
    </section>

    <section class="tabPanel" id="tabManage">
      <div class="card">
        <div class="sectionTitle">管理</div>
        <div class="manageButtons">
          <button type="button" id="btnBackup">バックアップ</button>
          <button type="button" id="btnRestore">データ復元</button>
          <button type="button" class="danger" id="btnDeleteAll">データ削除</button>
        </div>
        <input type="file" id="restoreFileInput" accept=".csv,.zip,text/csv,application/zip" hidden>
      </div>

      <div class="card">
        <div class="sectionTitle">この週の操作</div>
        <div class="manageButtons">
          <button type="button" class="danger" id="btnClear">この週を消去</button>
        </div>
      </div>
    </section>
  </div>

  <script src="jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
